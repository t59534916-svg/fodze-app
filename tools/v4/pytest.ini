[pytest]
# Marker registry — silences PytestUnknownMarkWarning + documents intent.
#
# requires_data : test needs external artifacts NOT in git — the 1.13 GB
#                 tools/sofascore/data/local_extras.db SQLite mirror and/or
#                 pre-built model pickles in tools/v4/artifacts/. These run
#                 locally + pre-deploy but are EXCLUDED in CI (fresh checkout
#                 has no mirror). CI invokes: pytest -m "not requires_data".
# integration   : heavier cross-module smoke (real-data orchestrator paths).
markers =
    requires_data: needs local SQLite mirror or model pickles (excluded in CI)
    integration: cross-module integration smoke test
