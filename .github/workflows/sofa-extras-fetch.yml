name: Sofa Phase 2 Extras Fetch
# Test curl_cffi (chrome TLS fingerprint) from GitHub Actions runner.
# Standard curl gets 403 (OpenSSL fingerprint). curl_cffi mimics chrome
# at TLS-level which may bypass CF.

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Season (e.g. 22/23)'
        required: true
        default: '22/23'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install curl_cffi
        run: pip install curl_cffi==0.7.4

      - name: Runner IP
        run: echo "Runner IP: $(curl -sS https://api.ipify.org)"

      - name: TLS-spoofed probe via curl_cffi
        run: |
          python3 <<'EOF'
          import curl_cffi.requests as cc
          import json

          for game_id in [10388349, 10388346, 10388343]:
              for endpoint in ['statistics', 'lineups', 'incidents', 'managers']:
                  url = f"https://api.sofascore.com/api/v1/event/{game_id}/{endpoint}"
                  try:
                      r = cc.get(url, impersonate="chrome124", timeout=15)
                      size = len(r.content)
                      status = "✓" if r.status_code == 200 else "✗"
                      print(f"{status} game={game_id}/{endpoint:<14} HTTP {r.status_code}  size={size}")
                      if r.status_code == 200:
                          # Confirm real data
                          data = r.json()
                          keys = list(data.keys())[:3]
                          print(f"    keys: {keys}")
                  except Exception as e:
                      print(f"✗ game={game_id}/{endpoint:<14} EXCEPTION: {type(e).__name__}: {e}")
          EOF
