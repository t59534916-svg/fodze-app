name: Fetch Live Odds

on:
  # Run every 4 hours on matchdays (Fri-Sun) + Wednesday (CL/EL)
  schedule:
    - cron: "17 6,10,14,18 * * 0,3,5,6"  # Sun, Wed, Fri, Sat at 06:17, 10:17, 14:17, 18:17 UTC
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      league:
        description: "Single league to fetch (empty = all)"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # `secrets` cannot be referenced in step-level `if:` directly. Hoist
    # the Telegram-token presence check to a job-level env var so the
    # value-alerts step can gate on it without breaking the workflow's
    # YAML validation (which previously made every run fail at 0s).
    env:
      HAS_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch odds from The-Odds-API
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.league }}" ]; then
            node scripts/fetch-odds.mjs --league ${{ github.event.inputs.league }}
          else
            node scripts/fetch-odds.mjs
          fi

      - name: Snapshot closing odds for pending bets near kickoff
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # Runs on every fetch — bets whose kickoff is within 2h get
        # their sharp closing line captured. CLV = log(placed/close)×100
        # is the only metric that separates real edge from variance.
        run: node scripts/snapshot-closing-odds.mjs --window 2h

      - name: Send Value Alerts to Telegram
        if: env.HAS_TELEGRAM == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/value-alerts.mjs --threshold 5

      - name: Send Line-Movement Alerts to Telegram
        if: env.HAS_TELEGRAM == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Reads odds_snapshots time-series (appended by fetch-odds step
        # above), surfaces matches where sharp prob shifted ≥5pp in the
        # last 24h. Sends a Markdown digest of top 10 movers. Each cron
        # tick re-evaluates → repeated movement keeps alerting (desired).
        # Failure non-fatal — value-alerts already ran above.
        run: node scripts/movement-alerts.mjs --threshold 5 --window 24h
        continue-on-error: true

      - name: Notify Telegram on workflow failure
        if: failure() && env.HAS_TELEGRAM == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Fires only if a previous step failed (`failure()`). Without
        # this, GitHub's default email-on-failure goes only to the repo
        # owner — easy to miss when the cron fails 7 days in a row
        # (silent drift of live_odds + closing snapshots). Telegram
        # ping makes operational failures actually visible.
        run: |
          MSG="⚠️ FODZE workflow FAILED: ${{ github.workflow }}%0Arun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MSG" > /dev/null || true
