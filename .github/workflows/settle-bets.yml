name: Settle Bets

on:
  # Run daily at 02:17 and 08:17 UTC — catches late Sunday matches + early Monday.
  # Also Monday 12:17 for Monday Night Football.
  schedule:
    - cron: "17 2 * * *"
    - cron: "17 8 * * *"
    - cron: "17 12 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Look back N days (default 3)"
        required: false
        default: "3"
      league:
        description: "Single league (empty = all)"
        required: false
        default: ""

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Settle completed bets
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          LEAGUE="${{ github.event.inputs.league }}"
          DAYS="${{ github.event.inputs.days }}"
          DAYS="${DAYS:-3}"
          if [ -n "$LEAGUE" ]; then
            node scripts/fetch-results.mjs --league "$LEAGUE" --days "$DAYS"
          else
            node scripts/fetch-results.mjs --days "$DAYS"
          fi

      - name: Populate match_outcomes (predictions×reality bridge)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/populate-match-outcomes.mjs --days 30
        # Joins team_xg_history's home/away rows into one match_outcomes
        # row per match (with goals + xG + shots + corners + cards). The
        # /backtest page joins match_predictions × match_outcomes for
        # per-engine Brier/log-loss. Idempotent UPSERT on match_key.
        # Filters FootyStats -1 sentinels to NULL to avoid polluting the
        # joined Brier reports.

      - name: Backfill BL1+BL2+Liga3 goals-as-xG proxy (OpenLigaDB, free)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/backfill-liga3-openligadb.mjs
        # OpenLigaDB (free, no key) covers all 3 German tiers (bl1/bl2/bl3).
        # Script generalized 2026-04-26 — no flags = all 3 leagues default.
        # Upserts current + previous season daily; idempotent so re-runs
        # within 24h of final whistle always have latest matchday.
        # For BL1+BL2 the goals-proxy rows COEXIST with FootyStats real-xG
        # rows — UNIQUE merge means FootyStats wins when imported (richer
        # data), but goals-proxy fills gaps on days FootyStats CSV hasn't
        # been manually imported yet. Eliminates the BL1/BL2 "0 entries
        # for finished match" UX glitch.

      - name: (Legacy) Odds-API Liga 3 goals proxy — disabled
        if: false
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/backfill-liga3-goals.mjs --days 3
        # Kept as documentation — OpenLigaDB replaced it above.

      - name: Backfill real xG from FootyStats (if API key configured)
        env:
          FOOTYSTATS_API_KEY: ${{ secrets.FOOTYSTATS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # No-op without FOOTYSTATS_API_KEY — just logs "skipped".
        # When the key is added, Liga 3 starts getting real per-match xG
        # and the goals-proxy rows are replaced on conflict.
        run: node scripts/backfill-footystats.mjs --league liga3
